# Python wheel build workflow
#
# Builds release wheels for the edgefirst-tflite Python package on multiple
# platforms using maturin with zig for manylinux2014 compatibility on Linux.
#
# Action Versions (hash-pinned):
# - actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 (v4.2.2)
# - actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 (v5)
# - actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 (v4)
# - dtolnay/rust-toolchain@56f84321dbccf38fb67ce29ab63e4754056677e0 (master)

name: Python

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

env:
  CARGO_TERM_COLOR: always

jobs:
  build-wheels:
    name: Build wheels (${{ matrix.name }})
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: x86_64-linux
            runner: ubuntu-22.04
            maturin-args: --sdist --zig --compatibility manylinux2014
            maturin-deps: maturin[patchelf,zig]
          - name: aarch64-linux
            runner: ubuntu-22.04-arm
            maturin-args: --zig --compatibility manylinux2014
            maturin-deps: maturin[patchelf,zig]
          - name: windows
            runner: windows-latest
            maturin-args: ""
            maturin-deps: maturin
          - name: macos
            runner: macos-latest
            maturin-args: ""
            maturin-deps: maturin

    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@56f84321dbccf38fb67ce29ab63e4754056677e0 # master
        with:
          toolchain: stable

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: '3.11'

      - name: Install maturin
        run: pip install ${{ matrix.maturin-deps }}

      - name: Build wheels
        run: maturin build --release -m crates/python/Cargo.toml ${{ matrix.maturin-args }}

      - name: Upload wheels
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: wheels-${{ matrix.name }}
          path: target/wheels/*
          retention-days: 7
